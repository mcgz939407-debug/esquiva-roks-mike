<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#10122b">
  <title>Esquiva Roks Mike</title>
  <style>
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0; min-height:100dvh; overflow:hidden; overscroll-behavior:none; display:grid; place-items:center; background:#080a18; color:#fff; font-family:system-ui,-apple-system,sans-serif; touch-action:none; }
    #game { width:min(100vw,520px); height:100dvh; max-height:900px; display:block; background:#10122b; }
    #overlay { position:fixed; inset:0; overflow:auto; display:grid; place-items:center; padding:20px; text-align:center; background:linear-gradient(#10122bdd,#10122bf2); z-index:3; }
    .card { width:min(420px,100%); padding:22px 18px; border:1px solid #7c7dff; border-radius:28px; background:#171a3df2; box-shadow:0 0 45px #6d5cff66; }
    h1 { margin:0 0 6px; font-size:clamp(1.7rem,8vw,2.6rem); line-height:.95; letter-spacing:.04em; }
    .title-rank { color:#75f5d0; font-size:1.1rem; font-weight:700; margin:4px 0 10px; text-shadow:0 0 10px #75f5d066; }
    p { color:#d8dcff; line-height:1.4; margin:8px 0; }
    button { border:0; border-radius:14px; padding:12px; color:#10122b; background:#75f5d0; font:800 .95rem system-ui; cursor:pointer; }
    #start { width:100%; margin-top:10px; box-shadow:0 4px 0 #32a88f; }
    #start:active,#shoot:active,#pauseBtn:active,#btnAd:active,#btnCoin:active { transform:translateY(3px) scale(.98); box-shadow:none; }
    #ships { display:grid; grid-template-columns:1fr; gap:7px; margin-top:12px; max-height:180px; overflow:auto; text-align:left; }
    .ship { display:flex; align-items:center; gap:10px; width:100%; padding:9px; color:#eaf0ff; background:#252954; border:1px solid #4e5493; border-radius:14px; text-align:left; font-weight:700; font-size:.9rem; }
    .ship.selected { border-color:#75f5d0; background:#1f4a51; }
    .ship b { display:block; font-size:.92rem; } .ship small { display:block; color:#c3cbff; font-weight:500; font-size:.75rem; }
    .ship .cost { margin-left:auto; color:#f6d366; white-space:nowrap; font-size:.85rem; }
    #shoot { position:fixed; bottom:max(18px,env(safe-area-inset-bottom)); right:max(18px,env(safe-area-inset-right)); width:72px; height:72px; border:3px solid #f6d366; border-radius:50%; padding:0; color:#fff; background:#d47135e8; font:900 .7rem system-ui; letter-spacing:.04em; box-shadow:0 4px 0 #87351f,0 0 22px #ff9e5b; z-index:2; }
    #pauseBtn { position:fixed; top:max(10px,env(safe-area-inset-top)); right:max(10px,env(safe-area-inset-top)); width:48px; height:48px; border:2px solid #7c7dff; border-radius:50%; padding:0; color:#fff; background:#252954cc; font:800 1rem system-ui; z-index:2; }
    .hint { font-size:.78rem; color:#9fa8df; } [hidden] { display:none!important; }
    #hud { position:fixed; top:max(8px,env(safe-area-inset-top)); left:max(8px,env(safe-area-inset-left)); z-index:2; pointer-events:none; }
    #hudLives { display:flex; gap:5px; margin-top:4px; align-items:center; }
    .life-dia { width:14px; height:14px; background:#3a3e6b; clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%); transition:background .3s; }
    .life-dia.active { background:#5bc0ff; box-shadow:0 0 6px #5bc0ff; }
    .health-bar { width:100px; height:6px; background:#252954; border-radius:3px; overflow:hidden; margin-top:4px; }
    .health-fill { height:100%; background:#75f5d0; border-radius:3px; transition:width .2s; }
    .lives-zero { color:#ff838c; font:700 .85rem system-ui; margin-top:6px; }
    .timer { color:#f6d366; font:800 1.1rem system-ui; margin:6px 0; }
    .buy-row { display:flex; gap:8px; justify-content:center; margin-top:10px; }
    #btnCoin { background:#f6d366; color:#10122b; font-size:.85rem; padding:10px 14px; box-shadow:0 3px 0 #a8831c; }
    #btnAd { background:#8fb8ff; color:#10122b; font-size:.85rem; padding:10px 14px; box-shadow:0 3px 0 #4a6fa5; }
    .achieve-toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); opacity:0; padding:10px 18px; background:#252954; border:1px solid #75f5d0; border-radius:14px; color:#75f5d0; font:700 .85rem system-ui; pointer-events:none; transition:all .4s; z-index:4; }
    .achieve-toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
    #records { margin-top:10px; text-align:left; }
    #records h3 { margin:0 0 6px; font-size:.9rem; color:#aeb7ef; }
    .rec-row { display:flex; justify-content:space-between; font-size:.78rem; color:#c3cbff; padding:3px 0; border-bottom:1px solid #252954; }
    .no-lives-box { padding:12px; border:1px solid #ff5964; border-radius:14px; background:#2a0f14; margin:10px 0; }
  </style>
</head>
<body>
  <canvas id="game" aria-label="Juego Esquiva Roks Mike"></canvas>
  <button id="shoot" hidden aria-label="Disparar a las rocas">DISPARAR</button>
  <button id="pauseBtn" hidden aria-label="Pausar">⏸</button>
  <div id="hud" hidden>
    <div style="font:800 17px system-ui;color:#fff" id="hudScore">0000</div>
    <div style="font:700 10px system-ui;color:#aeb7ef;margin-top:2px">NIVEL <span id="hudLevel">1</span></div>
    <div id="hudLives"></div>
  </div>
  <div class="achieve-toast" id="toast"></div>
  <section id="overlay">
    <div class="card">
      <h1 id="title">ESQUIVA<br>ROKS MIKE</h1>
      <div class="title-rank" id="rankTitle">Explorador Espacial</div>
      <p id="message">Desliza tu dedo para mover la nave. Destruye 50 rocas para subir de nivel.</p>
      <div id="wallet">🪙 <b id="coins">0</b> monedas</div>
      <div id="livesInfo" style="margin-top:6px;font:700 .85rem system-ui;color:#5bc0ff">💎 Vidas: <span id="livesCount">5</span>/5</div>
      <div class="no-lives-box" id="noLivesBox" hidden>
        <div class="lives-zero">💎 Sin vidas</div>
        <div class="timer" id="lifeTimer">Recargando en 30:00</div>
        <div class="buy-row">
          <button id="btnCoin">🪙 20 monedas</button>
          <button id="btnAd">📺 Ver anuncio</button>
        </div>
      </div>
      <div id="ships"></div>
      <div id="records"></div>
      <button id="start">JUGAR</button>
      <p class="hint">Cada nivel cambia la música. Toca ⏸ para pausar.</p>
    </div>
  </section>
  <script>
    const canvas=document.querySelector('#game'),ctx=canvas.getContext('2d');
    const overlay=document.querySelector('#overlay'), start=document.querySelector('#start'), shoot=document.querySelector('#shoot'), pauseBtn=document.querySelector('#pauseBtn');
    const title=document.querySelector('#title'),message=document.querySelector('#message'),shipsEl=document.querySelector('#ships'),coinsEl=document.querySelector('#coins');
    const hud=document.querySelector('#hud'), hudScore=document.querySelector('#hudScore'), hudLevel=document.querySelector('#hudLevel'), hudLives=document.querySelector('#hudLives');
    const recordsEl=document.querySelector('#records'), toastEl=document.querySelector('#toast');
    const livesCountEl=document.querySelector('#livesCount'), noLivesBox=document.querySelector('#noLivesBox'), lifeTimerEl=document.querySelector('#lifeTimer');
    const rankTitle=document.querySelector('#rankTitle'), btnCoin=document.querySelector('#btnCoin'), btnAd=document.querySelector('#btnAd');
    const SHIPS=[
      {name:'Nave Inicial',cost:0,color:'#75f5d0',desc:'Disparo simple',shots:1,spread:0,power:1},
      {name:'Nave Ráfaga',cost:40,color:'#8fb8ff',desc:'Dos disparos juntos',shots:2,spread:10,power:1},
      {name:'Nave Triple',cost:80,color:'#d891ff',desc:'Tres disparos abiertos',shots:3,spread:15,power:1},
      {name:'Nave Cañón',cost:160,color:'#ffbf65',desc:'Proyectil poderoso',shots:1,spread:0,power:2},
      {name:'Nave Rayo',cost:320,color:'#ff75bf',desc:'Ráfaga de energía',shots:3,spread:7,power:2}
    ];
    const POWERUPS=[
      {type:'shield',label:'🛡️',color:'#75f5d0',chance:.06},
      {type:'rapid',label:'⚡',color:'#f6d366',chance:.05},
      {type:'bomb',label:'💣',color:'#ff5964',chance:.03},
      {type:'coin',label:'🪙',color:'#f6d366',chance:.08}
    ];
    const RANKS=[
      {maxLevel:0,title:'Explorador Espacial'},
      {maxLevel:2,title:'Piloto Novato'},
      {maxLevel:4,title:'Cazador de Rocas'},
      {maxLevel:7,title:'As del Espacio'},
      {maxLevel:10,title:'Comandante Galáctico'},
      {maxLevel:999,title:'Leyenda Universal'}
    ];
    let W,H,scale,running=false,paused=false,last=0,time=0,spawn=0,score=0,kills=0,level=1,nextShot=0,controlPointer=null;
    let ship,rocks,shots,stars,particles,powerups,boss,keys={},selected=+localStorage.roksShip||0;
    let coins=+localStorage.roksCoins||0,owned=JSON.parse(localStorage.roksOwned||'[true,false,false,false,false]'),best=+localStorage.roksBest||0;
    let lives=+localStorage.roksLives||5, maxLevelReached=+localStorage.roksMaxLevel||0, totalMissed=0, levelMissed=0, inBossLevel=false;
    let shieldActive=false,rapidTimer=0,flash='',flashUntil=0,screenShake=0;
    let audioCtx=null,musicTimer=null,records=JSON.parse(localStorage.roksRecords||'[]');
    const LIFE_REGEN_MS=30*60*1000;
    const MAX_LIVES=5;

    function save(){
      localStorage.roksCoins=coins; localStorage.roksOwned=JSON.stringify(owned); localStorage.roksShip=selected;
      localStorage.roksBest=best; localStorage.roksRecords=JSON.stringify(records); localStorage.roksMaxLevel=maxLevelReached;
      localStorage.roksLives=lives; localStorage.roksNextLifeTime=nextLifeTime;
    }
    function loadLives(){
      lives=+localStorage.roksLives||MAX_LIVES;
      nextLifeTime=+localStorage.roksNextLifeTime||0;
      if(lives<MAX_LIVES&&nextLifeTime>0){
        let now=Date.now(); let gained=0;
        while(now>=nextLifeTime&&lives+gained<MAX_LIVES){gained++; nextLifeTime+=LIFE_REGEN_MS;}
        lives=Math.min(MAX_LIVES,lives+gained); if(lives>=MAX_LIVES)nextLifeTime=0;
      }
      save();
    }
    let nextLifeTime=0;
    function loseLife(){lives--; totalMissed=0; levelMissed=0; if(lives<MAX_LIVES&&nextLifeTime===0)nextLifeTime=Date.now()+LIFE_REGEN_MS; save();}
    function addLife(){lives=Math.min(MAX_LIVES,lives+1); if(lives>=MAX_LIVES)nextLifeTime=0; save();}

    function showToast(text){toastEl.textContent=text;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),2200);}

    function getRankTitle(ml){for(let r of RANKS){if(ml<=r.maxLevel)return r.title;}return RANKS[RANKS.length-1].title;}
    function resize(){scale=Math.min(devicePixelRatio||1,2);W=canvas.clientWidth;H=canvas.clientHeight;canvas.width=W*scale;canvas.height=H*scale;ctx.setTransform(scale,0,0,scale,0,0);}
    addEventListener('resize',resize);resize();

    function renderShips(){coinsEl.textContent=coins;shipsEl.innerHTML='';SHIPS.forEach((s,i)=>{let b=document.createElement('button');b.className='ship '+(selected===i?'selected ':'')+(owned[i]?'':'locked');b.innerHTML='<span style="font-size:1.5rem;color:'+s.color+'">▲</span><span><b>'+s.name+'</b><small>'+s.desc+'</small></span><span class="cost">'+(owned[i]?(selected===i?'EQUIPADA':'ELEGIR'):'🪙 '+s.cost)+'</span>';b.onclick=()=>chooseShip(i);shipsEl.appendChild(b);});}
    function chooseShip(i){if(!owned[i]){if(coins<SHIPS[i].cost){message.textContent='Necesitas '+SHIPS[i].cost+' monedas.';return;}coins-=SHIPS[i].cost;owned[i]=true;message.textContent='¡Nueva nave conseguida!';}selected=i;save();renderShips();}
    function renderRecords(){records.sort((a,b)=>b-a);records=records.slice(0,5);recordsEl.innerHTML='<h3>🏆 Mejores puntuaciones</h3>'+(records.length?records.map((s,i)=>'<div class="rec-row"><span>#'+(i+1)+'</span><span><b>'+s+'</b></span></div>').join(''):'<div class="rec-row"><span>Aún sin records</span></div>');}
    function renderLives(){livesCountEl.textContent=lives;noLivesBox.hidden=lives>0;start.disabled=lives<=0;start.style.opacity=lives<=0?.5:1;updateLifeTimer();}
    function updateLifeTimer(){if(lives>=MAX_LIVES)return;let rem=nextLifeTime-Date.now();if(rem<=0){loadLives();renderLives();return;}let m=Math.floor(rem/60000),s=Math.floor((rem%60000)/1000);lifeTimerEl.textContent='Recargando en '+m+':'+String(s).padStart(2,'0');setTimeout(updateLifeTimer,1000);}

    function reset(){
      ship={x:W/2,y:H-140,r:20,targetX:W/2,targetY:H-140};
      rocks=[];shots=[];particles=[];powerups=[];boss=null;
      score=0;kills=0;level=1;totalMissed=0;levelMissed=0;inBossLevel=false;shieldActive=false;rapidTimer=0;screenShake=0;
      time=0;spawn=0;
      stars=Array.from({length:72},()=>({x:Math.random()*W,y:Math.random()*H,z:.2+Math.random()*2.2,layer:Math.random()<.3?1:(Math.random()<.5?2:3)}));
    }

    function play(){
      loadLives(); if(lives<=0){renderLives();return;}
      reset();running=true;paused=false;overlay.hidden=true;shoot.hidden=false;pauseBtn.hidden=false;hud.hidden=false;last=performance.now();startMusic();requestAnimationFrame(loop);
    }
    function pauseGame(){if(!running)return;paused=!paused;startMusic();}
    function finish(reason='¡CHOCASTE!'){
      running=false;stopMusic();shoot.hidden=true;pauseBtn.hidden=true;hud.hidden=true;
      best=Math.max(best,Math.floor(score));records.push(Math.floor(score));maxLevelReached=Math.max(maxLevelReached,level);save();
      if(reason.includes('INVASIÓN'))playSiren();
      title.innerHTML='ESQUIVA<br>ROKS MIKE';rankTitle.textContent=getRankTitle(maxLevelReached);rankTitle.style.display='block';
      message.innerHTML='Puntuación: <b>'+Math.floor(score)+'</b><br>Rocas destruidas: <b>'+kills+'</b><br>Mejor marca: <b>'+best+'</b><br>Nivel máx: <b>'+maxLevelReached+'</b>';start.textContent='JUGAR OTRA VEZ';
      renderShips();renderRecords();renderLives();overlay.hidden=false;
    }

    function getRockSpeed(){return 100+Math.random()*60+Math.max(0,level-5)*28;}
    function addRock(){
      if(inBossLevel&&boss)return;
      const r=13+Math.random()*20;let hp=Math.random()<.12+Math.min(level,.12)*.02?2:1;let split=false;
      if(level>=3&&Math.random()<.15){hp=3;r=22+Math.random()*12;split=true;}
      rocks.push({x:r+Math.random()*(W-r*2),y:-r-5,r,vy:getRockSpeed(),spin:Math.random()*6,hp,hpMax:hp,split,ang:0,rotSpeed:(Math.random()-.5)*4});
    }
    function addBoss(){
      inBossLevel=true;boss={x:W/2,y:80,r:48,hp:15+level*3,hpMax:15+level*3,vy:40,dir:1,nextAttack:1.5,phase:0};
      flash='¡JEFE DEL NIVEL '+level+'!';flashUntil=performance.now()+2500;screenShake=12;
    }
    function spawnParticles(x,y,color,count=10,speed=120,life=.6){for(let i=0;i<count;i++){particles.push({x,y,vx:(Math.random()-.5)*speed*2,vy:(Math.random()-.5)*speed*2,life,lifeMax:life,color,r:Math.random()*2.5+1});}}
    function spawnPowerup(x,y){let pool=POWERUPS.filter(p=>Math.random()<p.chance*1.5);if(!pool.length)return;let p=pool[Math.floor(Math.random()*pool.length)];powerups.push({x,y,y:y,vy:60,r:14,type:p.type,label:p.label,color:p.color,life:10});}

    function levelUp(){
      level++;coins+=10;levelMissed=0;save();renderShips();flash='¡NIVEL '+level+'!  +10 🪙';flashUntil=performance.now()+1800;screenShake=8;
      if(level%5===0){addBoss();}else{inBossLevel=false;boss=null;}
      startMusic();
    }

    function update(dt){
      time+=dt;score+=dt*(10+level*2);spawn-=dt;let gap=Math.max(.18,.65-level*.04);if(inBossLevel)gap=999;
      if(spawn<=0&&!inBossLevel){addRock();spawn=gap;}
      // Movimiento
      let moveX=(keys.ArrowLeft?-1:0)+(keys.ArrowRight?1:0);
      let moveY=(keys.ArrowUp?-1:0)+(keys.ArrowDown?1:0);
      if(moveX)ship.targetX+=moveX*W*dt*.9;
      ship.targetX=Math.max(ship.r,Math.min(W-ship.r,ship.targetX));
      ship.x+=(ship.targetX-ship.x)*Math.min(1,dt*13);
      if(level>=3){
        if(moveY)ship.targetY+=moveY*H*dt*.9;
        let minY=ship.r+55;let maxY=H-ship.r-(shoot.hidden?40:130);
        ship.targetY=Math.max(minY,Math.min(maxY,ship.targetY));
        ship.y+=(ship.targetY-ship.y)*Math.min(1,dt*13);
      }else{
        ship.targetY=H-140;ship.y+=(ship.targetY-ship.y)*Math.min(1,dt*13);
      }
      // rastro de fuego
      if(Math.random()<.7)particles.push({x:ship.x+(Math.random()-.5)*6,y:ship.y+20,vx:(Math.random()-.5)*30,vy:60+Math.random()*40,life:.35,lifeMax:.35,color:Math.random()<.5?'#ff9e5b':'#ff5964',r:Math.random()*2+1});
      // estrellas parallax
      stars.forEach(s=>{let spd=30*s.z*(s.layer===1?.4:(s.layer===2?1:1.8));s.y+=spd*dt;if(s.y>H){s.y=-3;s.x=Math.random()*W;}});
      // disparos
      for(let i=shots.length-1;i>=0;i--){shots[i].y-=680*dt;if(shots[i].y<-20)shots.splice(i,1);}
      // powerups
      for(let i=powerups.length-1;i>=0;i--){let p=powerups[i];p.y+=p.vy*dt;p.life-=dt;if(p.life<=0){powerups.splice(i,1);continue;}if(Math.hypot(p.x-ship.x,p.y-ship.y)<p.r+ship.r+8){applyPowerup(p.type);powerups.splice(i,1);continue;}if(p.y>H+30)powerups.splice(i,1);}
      // jefe
      if(boss){let b=boss;b.x+=b.dir*90*dt;b.ang=(b.ang||0)+dt*2;b.phase+=dt;if(b.x<b.r+20||b.x>W-b.r-20)b.dir*=-1;b.y+=Math.sin(b.phase)*30*dt;b.nextAttack-=dt;if(b.nextAttack<=0){b.nextAttack=1.8;let a={x:b.x,y:b.y+b.r+8,r:9,vy:200+level*15,spin:0,hp:1,hpMax:1,ang:0,rotSpeed:0};rocks.push(a);}for(let j=shots.length-1;j>=0;j--){let s=shots[j];if(Math.hypot(b.x-s.x,b.y-s.y)<b.r+s.r){b.hp-=s.power;spawnParticles(s.x,s.y,'#ff9e5b',6,80,.3);shots.splice(j,1);if(b.hp<=0){spawnParticles(b.x,b.y,'#ff9e5b',40,200,1);spawnParticles(b.x,b.y,'#fa777f',30,150,.8);score+=100;kills++;if(kills%50===0)levelUp();else{inBossLevel=false;boss=null;}screenShake=14;break;}}}}
      // rocas
      for(let i=rocks.length-1;i>=0;i--){
        let a=rocks[i];a.y+=a.vy*dt;a.spin+=dt*2;a.ang+=a.rotSpeed*dt;
        if(a.y-a.r>H){rocks.splice(i,1);totalMissed++;levelMissed++;if(!inBossLevel&&totalMissed>=3){loseLife();if(lives>0){flash='¡-1 VIDA!';flashUntil=performance.now()+1500;screenShake=8;totalMissed=0;levelMissed=0;continue;}else return finish('¡INVASIÓN!');}continue;}
        if(!inBossLevel&&Math.hypot(a.x-ship.x,a.y-ship.y)<a.r+ship.r-4){
          if(shieldActive){shieldActive=false;spawnParticles(ship.x,ship.y,'#75f5d0',20,120,.5);rocks.splice(i,1);continue;}
          loseLife();screenShake=10;spawnParticles(ship.x,ship.y,'#ff5964',25,150,.6);rocks.splice(i,1);if(lives>0){flash='¡-1 VIDA!';flashUntil=performance.now()+1500;continue;}else return finish();
        }
        for(let j=shots.length-1;j>=0;j--){
          let s=shots[j];if(Math.hypot(a.x-s.x,a.y-s.y)<a.r+s.r){
            a.hp-=s.power;spawnParticles(a.x,a.y,a.hp>1?'#bd69ff':'#fa777f',8,90,.4);shots.splice(j,1);
            if(a.hp<=0){
              spawnParticles(a.x,a.y,a.split?'#ffbf65':'#fa777f',14,110,.5);
              if(a.split){let nr=a.r*.7;rocks.push({x:a.x,y:a.y,r:nr,vy:getRockSpeed(),spin:Math.random()*6,hp:1,hpMax:1,split:false,ang:0,rotSpeed:(Math.random()-.5)*5});rocks.push({x:a.x,y:a.y,r:nr,vy:getRockSpeed(),spin:Math.random()*6,hp:1,hpMax:1,split:false,ang:0,rotSpeed:(Math.random()-.5)*5});}
              rocks.splice(i,1);kills++;score+=25;if(kills%50===0)levelUp();
              if(Math.random()<.15)spawnPowerup(a.x,a.y);
              if(navigator.vibrate)navigator.vibrate(15);
            }break;
          }
        }
      }
      // partículas
      for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;if(p.life<=0)particles.splice(i,1);}
      if(rapidTimer>0)rapidTimer-=dt;
      if(screenShake>0)screenShake-=dt*18;
    }

    function applyPowerup(type){
      if(type==='shield'){shieldActive=true;flash='🛡️ ESCUDO ACTIVADO';flashUntil=performance.now()+1200;}
      if(type==='rapid'){rapidTimer=6;flash='⚡ DISPARO RÁPIDO';flashUntil=performance.now()+1200;}
      if(type==='bomb'){rocks.forEach(r=>{spawnParticles(r.x,r.y,'#ff5964',10,130,.4);});score+=rocks.length*10;kills+=rocks.length;rocks=[];flash='💣 ¡BOMBA!';flashUntil=performance.now()+1200;screenShake=8;}
      if(type==='coin'){coins+=5;save();renderShips();flash='🪙 +5 MONEDAS';flashUntil=performance.now()+1000;}
    }

    function drawLives(){
      hudLives.innerHTML='';
      for(let i=0;i<MAX_LIVES;i++){let d=document.createElement('div');d.className='life-dia '+(i<lives?'active':'');hudLives.appendChild(d);}
    }
    function draw(){
      let sx=0,sy=0;if(screenShake>0){sx=(Math.random()-.5)*screenShake*2;sy=(Math.random()-.5)*screenShake*2;}
      ctx.save();ctx.translate(sx,sy);
      ctx.clearRect(-10,-10,W+20,H+20);ctx.fillStyle='#10122b';ctx.fillRect(-10,-10,W+20,H+20);
      stars.forEach(s=>{let a=.15+s.z*.18;ctx.fillStyle='rgba(190,220,'+(s.layer===3?200:255)+','+a+')';ctx.fillRect(s.x,s.y,s.z*(s.layer===3?1.4:.8),s.z*(s.layer===3?1.4:.8));});
      particles.forEach(p=>{let a=Math.max(0,p.life/p.lifeMax);ctx.fillStyle=p.color;ctx.globalAlpha=a;ctx.beginPath();ctx.arc(p.x,p.y,p.r*a,0,7);ctx.fill();ctx.globalAlpha=1;});
      powerups.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);let pulse=1+Math.sin(performance.now()*.006)*.15;ctx.scale(pulse,pulse);ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=12;ctx.beginPath();ctx.arc(0,0,p.r,0,7);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font='700 10px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.label,0,0);ctx.restore();});
      shots.forEach(s=>{ctx.strokeStyle=s.color;ctx.lineWidth=s.r;ctx.shadowColor=s.color;ctx.shadowBlur=12;ctx.beginPath();ctx.moveTo(s.x,s.y+12);ctx.lineTo(s.x,s.y-12);ctx.stroke();ctx.shadowBlur=0;});
      rocks.forEach(a=>{ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.ang);ctx.fillStyle=a.hp>1?'#bd69ff':'#fa777f';ctx.shadowColor=a.hp>1?'#9a62ff':'#ff5964';ctx.shadowBlur=12;ctx.beginPath();for(let k=0;k<9;k++){let rr=a.r*(.75+Math.sin(k*8.3+a.spin)*.16),q=k*Math.PI*2/9;k?ctx.lineTo(Math.cos(q)*rr,Math.sin(q)*rr):ctx.moveTo(Math.cos(q)*rr,Math.sin(q)*rr)}ctx.closePath();ctx.fill();if(a.hp>1){ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();}ctx.restore();});
      if(boss){let b=boss;ctx.save();ctx.translate(b.x,b.y);ctx.rotate(Math.sin(b.phase)*.15);ctx.fillStyle='#ff5964';ctx.shadowColor='#ff5964';ctx.shadowBlur=25;ctx.beginPath();for(let k=0;k<12;k++){let rr=b.r*(.82+Math.sin(k*6.5+b.ang)*.18),q=k*Math.PI*2/12;k?ctx.lineTo(Math.cos(q)*rr,Math.sin(q)*rr):ctx.moveTo(Math.cos(q)*rr,Math.sin(q)*rr)}ctx.closePath();ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font='800 11px system-ui';ctx.textAlign='center';ctx.fillText('JEFE',0,5);ctx.fillStyle='#ff838c';ctx.fillRect(-b.r+6,b.r+10,(b.r*2-12)*(b.hp/b.hpMax),5);ctx.restore();}
      let kind=SHIPS[selected];ctx.save();ctx.translate(ship.x,ship.y);ctx.shadowColor=kind.color;ctx.shadowBlur=20;ctx.fillStyle=kind.color;ctx.beginPath();ctx.moveTo(0,-26);ctx.lineTo(20,20);ctx.lineTo(0,13);ctx.lineTo(-20,20);ctx.closePath();ctx.fill();ctx.fillStyle='#eaffff';ctx.beginPath();ctx.arc(0,1,6,0,7);ctx.fill();if(shieldActive){ctx.strokeStyle='#75f5d0';ctx.lineWidth=2;ctx.globalAlpha=.5+Math.sin(performance.now()*.008)*.3;ctx.beginPath();ctx.arc(0,0,ship.r+8,0,7);ctx.stroke();ctx.globalAlpha=1;}ctx.restore();
      hudScore.textContent=String(Math.floor(score)).padStart(4,'0');hudLevel.textContent=level;drawLives();
      if(performance.now()<flashUntil){ctx.textAlign='center';ctx.font='900 22px system-ui';ctx.fillStyle='#75f5d0';ctx.fillText(flash,W/2,H*.28);}
      if(paused){ctx.fillStyle='rgba(8,10,24,.65)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.font='900 34px system-ui';ctx.fillStyle='#fff';ctx.fillText('PAUSADO',W/2,H*.45);ctx.font='700 16px system-ui';ctx.fillStyle='#aeb7ef';ctx.fillText('Toca ⏸ para continuar',W/2,H*.55);}
      ctx.restore();
    }
    function loop(now){if(!running)return;let dt=Math.min(.035,(now-last)/1000);last=now;if(!paused){update(dt);}draw();if(running)requestAnimationFrame(loop);}

    function point(e){const r=canvas.getBoundingClientRect();return{eX:e.clientX-r.left,eY:e.clientY-r.top};}
    canvas.addEventListener('pointerdown',e=>{if(!running||paused)return;controlPointer=e.pointerId;canvas.setPointerCapture?.(e.pointerId);let p=point(e);ship.targetX=p.eX;if(level>=3)ship.targetY=p.eY;});
    canvas.addEventListener('pointermove',e=>{if(running&&e.pointerId===controlPointer&&!paused){let p=point(e);ship.targetX=p.eX;if(level>=3)ship.targetY=p.eY;}});
    canvas.addEventListener('pointerup',e=>{if(e.pointerId===controlPointer)controlPointer=null;});
    canvas.addEventListener('pointercancel',e=>{if(e.pointerId===controlPointer)controlPointer=null;});

    function fire(e){e.preventDefault();if(!running||paused||performance.now()<nextShot)return;let k=SHIPS[selected];let fireRate=selected===4?130:220;if(rapidTimer>0)fireRate*=.35;for(let i=0;i<k.shots;i++){let offset=(i-(k.shots-1)/2)*k.spread;shots.push({x:ship.x+offset,y:ship.y-27,r:k.power===2?7:4,power:k.power,color:k.color});}beep(900,.06,'square',.025);nextShot=performance.now()+fireRate;}
    shoot.addEventListener('pointerdown',fire);shoot.addEventListener('click',fire);

    addEventListener('keydown',e=>{keys[e.key]=true;if(e.key==='p'||e.key==='P'||e.key==='Escape'){if(running)pauseGame();}});
    addEventListener('keyup',e=>keys[e.key]=false);
    start.addEventListener('click',()=>{audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)();audioCtx.resume().catch(()=>{});play();});
    pauseBtn.addEventListener('click',pauseGame);
    btnCoin.addEventListener('click',()=>{if(coins>=20){coins-=20;addLife();save();renderShips();renderLives();showToast('🪙 Vida comprada');}else showToast('Necesitas 20 monedas');});
    btnAd.addEventListener('click',()=>{addLife();save();renderLives();showToast('📺 +1 vida por anuncio');});

    function beep(freq,duration,type='sine',volume=.035){if(!audioCtx)return;let o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(volume,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+duration);o.connect(g).connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+duration);}
    function playSiren(){
      if(!audioCtx)return;let now=audioCtx.currentTime;let osc=audioCtx.createOscillator(),g=audioCtx.createGain();osc.type='sawtooth';
      for(let i=0;i<3;i++){osc.frequency.setValueAtTime(400,now+i*.6);osc.frequency.linearRampToValueAtTime(800,now+i*.6+.2);osc.frequency.linearRampToValueAtTime(400,now+i*.6+.5);}
      g.gain.setValueAtTime(.08,now);g.gain.exponentialRampToValueAtTime(.001,now+2);osc.connect(g).connect(audioCtx.destination);osc.start(now);osc.stop(now+2);
    }
    function startMusic(){
      stopMusic();if(paused)return;try{
        let notes=[[220,277,330,277],[196,247,294,247],[247,311,370,311],[294,370,440,370]][(level-1)%4],n=0;
        musicTimer=setInterval(()=>{if(running&&!paused){beep(notes[n%4],.18,'triangle',.025);if(n%4===0)beep(notes[(n+2)%4]/2,.12,'sine',.018);n++;}},310);
      }catch(err){}
    }
    function stopMusic(){if(musicTimer){clearInterval(musicTimer);musicTimer=null;}}

    loadLives();renderShips();renderRecords();renderLives();rankTitle.textContent=getRankTitle(maxLevelReached);reset();draw();
  </script>
</body>
</html>
